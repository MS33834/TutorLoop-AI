name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      # Full ruff lint surface. The repo still carries historical style debt
      # (UP045, B008, B905, etc.), so this is allowed to fail until the debt
      # is fully paid down. Fix locally with `ruff check --fix app tests`.
      - name: ruff check
        continue-on-error: true
        run: ruff check --select E,W,F,I,N,UP,B,C4,SIM --ignore E501 app tests
      # Format and type checks are non-blocking while pre-existing debt is
      # resolved. Run `ruff format app tests` and fix mypy errors locally.
      - name: ruff format check
        continue-on-error: true
        run: ruff format --check app tests
      - name: mypy
        continue-on-error: true
        run: mypy app tests
      - run: python -m compileall app tests
      - name: pytest with coverage
        run: pytest --cov=app --cov-report=term-missing -q
      - run: docker build -t tutorloop-backend:test .

  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        # pgvector image so migrations that reference the vector extension
        # can be applied successfully (matches docker-compose).
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutorloop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      # Validate the full migration chain applies cleanly from scratch.
      # env.py reads DATABASE_URL from settings, so just expose it here.
      - name: Validate migration chain
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tutorloop
          SECRET_KEY: ci-migration-validation-secret-key-32chars-min
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run unit tests
        run: npm run test
      # Coverage collection requires @vitest/coverage-v8 in devDependencies.
      # Non-blocking until that dependency is added to package.json.
      - name: Run tests with coverage
        continue-on-error: true
        run: npx vitest run --coverage
      - run: npm run build
      - run: docker build -t tutorloop-frontend:test .
