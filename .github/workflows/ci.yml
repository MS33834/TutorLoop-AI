name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      # Scoped to correctness/import rules while the team pays down historical
      # style debt (UP045, B008, B905, etc.). Re-enable full ruff rules after
      # formatting and fixing the remaining lints.
      - run: ruff check --select E,W,F,I --ignore E501 app tests
      # Format and typecheck are intentionally skipped in CI until pre-existing
      # debt is resolved. Run `ruff format --check app tests` and `mypy app tests`
      # locally before re-enabling.
      # - run: ruff format --check app tests
      # - run: mypy app tests
      - run: python -m compileall app tests
      - run: pytest
      - run: docker build -t tutorloop-backend:test .

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
