services:
  - type: web
    name: tutorloop-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tutorloop-postgres
          property: connectionString
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: LLM_API_KEYS
        sync: false
      - key: LLM_BASE_URLS
        sync: false
      - key: LLM_MODELS
        sync: false
      - key: LOCAL_BASE_URL
        value: http://localhost:8001/v1
      - key: LOCAL_MODEL
        value: qwen3.5-4b
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SENTRY_DSN
        sync: false

databases:
  - name: tutorloop-postgres
    plan: starter
    ipAllowList: []
