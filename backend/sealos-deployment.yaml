apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutorloop-backend
  labels:
    app: tutorloop-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutorloop-backend
  template:
    metadata:
      labels:
        app: tutorloop-backend
    spec:
      containers:
        - name: backend
          # Replace with your registry and a pinned version tag. Avoid :latest
          # so rollouts are reproducible and can be rolled back precisely.
          image: ghcr.io/your-org/tutorloop-backend:0.2.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: DATABASE_URL
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SECRET_KEY
            - name: LLM_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_API_KEYS
            - name: LLM_BASE_URLS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_BASE_URLS
            - name: LLM_MODELS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_MODELS
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: CORS_ORIGINS
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SENTRY_DSN
            - name: UPLOAD_DIR
              value: /app/uploads
            - name: RUN_ALEMBIC_MIGRATIONS
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tutorloop-uploads
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutorloop-worker
  labels:
    app: tutorloop-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutorloop-worker
  template:
    metadata:
      labels:
        app: tutorloop-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/tutorloop-backend:0.2.0
          command: ["arq", "app.tasks.worker.WorkerSettings"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: DATABASE_URL
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SECRET_KEY
            - name: LLM_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_API_KEYS
            - name: LLM_BASE_URLS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_BASE_URLS
            - name: LLM_MODELS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_MODELS
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SENTRY_DSN
            - name: UPLOAD_DIR
              value: /app/uploads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tutorloop-backend
spec:
  selector:
    app: tutorloop-backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tutorloop-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
