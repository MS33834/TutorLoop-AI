apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutorloop-backend
  labels:
    app: tutorloop-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutorloop-backend
  template:
    metadata:
      labels:
        app: tutorloop-backend
    spec:
      containers:
        - name: backend
          # Replace with your registry and a pinned version tag. Avoid :latest
          # so rollouts are reproducible and can be rolled back precisely.
          image: ghcr.io/your-org/tutorloop-backend:0.2.0
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: DATABASE_URL
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SECRET_KEY
            - name: LLM_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_API_KEYS
            - name: LLM_BASE_URLS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_BASE_URLS
            - name: LLM_MODELS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_MODELS
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: CORS_ORIGINS
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SENTRY_DSN
            - name: LOCAL_BASE_URL
              value: http://localhost:8001/v1
            - name: LOCAL_MODEL
              value: qwen3.5-4b
            - name: VLM_MODEL
              value: qwen2.5-vl
            - name: VLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: VLM_BASE_URL
            - name: VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: VLM_API_KEY
            - name: UPLOAD_DIR
              value: /app/uploads
            # Migrations: each backend replica runs `alembic upgrade head` on
            # startup. With replicas > 1 this races — two pods may apply the
            # same migration concurrently and one will fail. Prefer running
            # migrations once in a pre-deploy Job (or set replicas: 1 for the
            # rollout) and keep RUN_ALEMBIC_MIGRATIONS=false on the web pods.
            - name: RUN_ALEMBIC_MIGRATIONS
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tutorloop-uploads
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tutorloop-worker
  labels:
    app: tutorloop-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tutorloop-worker
  template:
    metadata:
      labels:
        app: tutorloop-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/tutorloop-backend:0.2.0
          command: ["arq", "app.tasks.worker.WorkerSettings"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: DATABASE_URL
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: NEO4J_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SECRET_KEY
            - name: LLM_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_API_KEYS
            - name: LLM_BASE_URLS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_BASE_URLS
            - name: LLM_MODELS
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: LLM_MODELS
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: SENTRY_DSN
            - name: LOCAL_BASE_URL
              value: http://localhost:8001/v1
            - name: LOCAL_MODEL
              value: qwen3.5-4b
            - name: VLM_MODEL
              value: qwen2.5-vl
            - name: VLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: VLM_BASE_URL
            - name: VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tutorloop-secrets
                  key: VLM_API_KEY
            - name: UPLOAD_DIR
              value: /app/uploads
            - name: ARQ_MAX_JOBS
              value: "10"
            - name: ARQ_JOB_TIMEOUT
              value: "600"
            - name: ARQ_KEEP_RESULT
              value: "3600"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          # The worker runs arq (not an HTTP server), so use an exec probe that
          # verifies the arq process is still the container's PID 1. If the
          # process hangs without exiting, Kubernetes will restart the pod.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "grep -qa arq /proc/1/cmdline"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: tutorloop-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: tutorloop-backend
spec:
  selector:
    app: tutorloop-backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tutorloop-uploads
spec:
  # ReadWriteOnce allows only one node to mount at a time. If your cluster
  # storage class supports ReadWriteMany, switch to it so backend and worker
  # pods can be scheduled on different nodes. Alternatively, use object storage
  # (S3/R2) for uploads in production.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
