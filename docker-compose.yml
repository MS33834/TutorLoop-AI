version: "3.8"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: tutorloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tutorloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: tutorloop-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tutorloop-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorloop-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tutorloop
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      RUN_ALEMBIC_MIGRATIONS: "true"
      # Local dev key only; generate a strong random key for production.
      SECRET_KEY: ${SECRET_KEY:-tutorloop-local-dev-secret-key-not-for-production-use}
      # Allow the frontend (served by the frontend container on :80) and the
      # Vite dev server origins to call the API. Without this the default
      # (localhost:5173 only) blocks all browser requests from the compose stack.
      CORS_ORIGINS: http://localhost,http://localhost:5173,http://localhost:4173,http://127.0.0.1
      # --- LLM configuration -------------------------------------------------
      # Cloud LLM providers: comma-separated lists of equal length. Leave empty
      # to fall back to LOCAL_BASE_URL/LOCAL_MODEL below.
      # LLM_API_KEYS: sk-xxx,sk-yyy
      # LLM_BASE_URLS: https://api.deepseek.com/v1,https://api.openai.com/v1
      # LLM_MODELS: deepseek-chat,gpt-4o-mini
      # Local fallback LLM (vLLM / Ollama). Uncomment and point at a running
      # local model server to use it when no cloud keys are configured.
      LOCAL_BASE_URL: http://localhost:8001/v1
      LOCAL_MODEL: qwen3.5-4b
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorloop-worker
    restart: unless-stopped
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tutorloop
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      # The backend service runs Alembic migrations on startup; the worker must
      # NOT also run them (or call create_all) to avoid racing the backend on a
      # half-applied migration chain. Migrations are managed via Alembic only.
      RUN_ALEMBIC_MIGRATIONS: "false"
      SECRET_KEY: ${SECRET_KEY:-tutorloop-local-dev-secret-key-not-for-production-use}
      # --- LLM configuration -------------------------------------------------
      # Same cloud/local LLM settings as the backend service. The worker runs
      # video processing, KG extraction and AI key health probes, so it needs
      # the same provider configuration. Uncomment the cloud keys to enable.
      # LLM_API_KEYS: sk-xxx,sk-yyy
      # LLM_BASE_URLS: https://api.deepseek.com/v1,https://api.openai.com/v1
      # LLM_MODELS: deepseek-chat,gpt-4o-mini
      LOCAL_BASE_URL: http://localhost:8001/v1
      LOCAL_MODEL: qwen3.5-4b
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite inlines VITE_* at build time; pass it as a build arg so the
        # produced bundle points at the backend service. Override
        # VITE_API_BASE_URL (e.g. via a .env file or shell export) to match
        # the deployed backend's public URL; defaults to localhost for local dev.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: tutorloop-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  redis_data:
